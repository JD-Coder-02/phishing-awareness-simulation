<!DOCTYPE html>
<html>
<head>
<title>Collected Data</title>

<style>
body{
    font-family:Arial;
    text-align:center;
}
table{
    margin:auto;
    border-collapse:collapse;
    width:80%;
}
th,td{
    border:1px solid black;
    padding:10px;
}
</style>
</head>

<body>

<h2>Collected Data (Simulation)</h2>
<input type="file" onchange="loadFile(event)">
<button onclick="downloadData()">Download Data</button>

<p style="color:red;">
This is a phishing awareness simulation.
</p>

<table id="dataTable">
<tr>
<th>Username</th>
<th>Password</th>
<th>Time</th>
</tr>
</table>

<script>
let data = JSON.parse(localStorage.getItem("loginData")) || [];
let table = document.getElementById("dataTable");

data.forEach((item, index)=>{
    let row = table.insertRow();

    row.insertCell(0).innerText = item.username;
    row.insertCell(1).innerText = item.password;
    row.insertCell(2).innerText = item.timestamp;

    let btn = document.createElement("button");
    btn.innerText = "Delete";
    btn.onclick = function(){
        data.splice(index,1);
        localStorage.setItem("loginData", JSON.stringify(data));
        location.reload();
    };

    row.insertCell(3).appendChild(btn);
});
function loadFile(event){
    let file = event.target.files[0];
    let reader = new FileReader();

    reader.onload = function(e){
        localStorage.setItem("loginData", e.target.result);
        alert("Data Loaded Successfully");
        location.reload();
    }

    reader.readAsText(file);
}
function downloadData(){
    let data = localStorage.getItem("loginData");
    
    let blob = new Blob([data], {type: "application/json"});
    let url = URL.createObjectURL(blob);

    let a = document.createElement("a");
    a.href = url;
    a.download = "loginData.json";
    a.click();
}
</script>

</body>
</html>
